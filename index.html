<!doctype html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>wsのサウンドルーム</title>
        <link rel="stylesheet" href="style.css" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=LINE+Seed+JP:wght@100;400;700;800&display=swap"
            rel="stylesheet"
        />
    </head>
    <body>
        <div style="width: 100vw; height: 100px"></div>

        <div>
            <h1 class="line-seed-jp-extrabold" style="margin-bottom: 100px">
                コレクションルーム
            </h1>
            <div class="strVerRl">
                <div>
                    <p>ここは</p>
                    <p>超簡易的な音楽室。</p>
                    <p>作った音楽を</p>
                    <p>保管・鑑賞するお部屋。</p>
                </div>
            </div>
        </div>

        <div>
            <audio id="myAudio" src=""></audio>
            <button id="sndBtn">（いらっしゃいませ）</button>
        </div>

        <div class="strVerRl">
            <div>
                <p>これらは</p>
                <p>フリーゲーム向けに</p>
                <p>作ったもの。</p>
            </div>
        </div>

        <div class="plstGame">
            <div>
                <p id="status">【曲名を選択して再生】</p>

                <li>
                    <button class="music-item" data-src="music/ws_amb_001.wav">
                        かいそうの１
                    </button>
                    <button class="music-item" data-src="music/ws_amb_002.wav">
                        かいていどうくつ
                    </button>
                    <button class="music-item" data-src="music/ws_lofi_001.wav">
                        しきさいのもり(通常)
                    </button>
                    <button class="music-item" data-src="music/ws_lofi_002.wav">
                        しきさいのもり(低速)
                    </button>
                    <button class="music-item" data-src="music/ws_lofi_003.wav">
                        こんてぃにゅー？
                    </button>
                    <button class="music-item" data-src="music/ws_lofi_004.wav">
                        うたかた
                    </button>
                    <button class="music-item" data-src="music/ws_lofi_005.wav">
                        だいあーろぐ
                    </button>
                    <button
                        class="music-item"
                        data-src="music/ws_matsuri_001.wav"
                    >
                        たいこのおと？
                    </button>
                    <button
                        class="music-item"
                        data-src="music/ws_matsuri_002.wav"
                    >
                        たいこのおと
                    </button>
                    <button
                        class="music-item"
                        data-src="music/ws_matsuri_003.wav"
                    >
                        ふえのおと
                    </button>
                </li>
            </div>

            <p>※曲をもう一度選択すると停止※</p>
        </div>
        <script src="script.js"></script>
    </body>
</html>
